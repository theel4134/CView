name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build Release
        run: |
          chmod +x build_release.sh
          ./build_release.sh

      - name: Package App
        run: |
          cd Release
          zip -r -y CView.app.zip CView.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Release/CView.app.zip
          generate_release_notes: true

<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141416"/>
      <stop offset="1" stop-color="#0F1012"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FFA3"/>
      <stop offset="1" stop-color="#00B978"/>
    </linearGradient>
    <linearGradient id="thumbA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1C3B34"/>
      <stop offset="0.45" stop-color="#273546"/>
      <stop offset="1" stop-color="#16191F"/>
    </linearGradient>
    <linearGradient id="thumbB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2C1D36"/>
      <stop offset="0.5" stop-color="#154039"/>
      <stop offset="1" stop-color="#181A1E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">

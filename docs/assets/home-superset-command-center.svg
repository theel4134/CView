<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Superset Insight Dock home concept</title>
  <desc id="desc">A lightweight CView home screen with live-first content and a Superset insight dock.</desc>
  <defs>

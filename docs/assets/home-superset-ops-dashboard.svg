<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Superset operations home concept</title>
  <desc id="desc">A modern operations-focused home screen connecting CView live state with Superset alerts and diagnostics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10151A"/>
      <stop offset="0.55" stop-color="#0E171B"/>
      <stop offset="1" stop-color="#122019"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="32" y="28" width="88" height="844" rx="24" fill="#0B1115" stroke="#26333A"/>
  <circle cx="76" cy="78" r="18" fill="#00E09B"/>
  <rect x="55" y="140" width="42" height="42" rx="13" fill="#131D22" stroke="#2B3A43"/>
  <rect x="55" y="198" width="42" height="42" rx="13" fill="#0D2D24" stroke="#00E09B"/>
  <rect x="55" y="256" width="42" height="42" rx="13" fill="#131D22" stroke="#2B3A43"/>
  <rect x="55" y="314" width="42" height="42" rx="13" fill="#131D22" stroke="#2B3A43"/>

  <g transform="translate(156 48)">
    <text x="0" y="28" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="30" font-weight="800">운영 모니터 홈</text>
    <text x="0" y="58" fill="#93A6AD" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="15">시청 시작 전에 서버, 레이턴시, 멀티라이브 위험도를 먼저 확인</text>
    <rect x="890" y="0" width="268" height="42" rx="14" fill="#111D22" stroke="#2B3A43"/>
    <circle cx="916" cy="21" r="6" fill="#00E09B"/>
    <text x="934" y="26" fill="#DDEBE7" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="700">Superset 연결 정상</text>
  </g>

  <g transform="translate(156 132)" filter="url(#shadow)">
    <rect width="1158" height="122" rx="24" fill="#F7FAF8"/>
    <text x="28" y="42" fill="#122027" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="21" font-weight="800">운영 상태</text>
    <rect x="190" y="25" width="204" height="72" rx="18" fill="#EAF7F1" stroke="#BDEBD9"/>
    <rect x="414" y="25" width="204" height="72" rx="18" fill="#FFF5E8" stroke="#F2D3A7"/>
    <rect x="638" y="25" width="204" height="72" rx="18" fill="#EEF4FF" stroke="#C9D9F4"/>
    <rect x="862" y="25" width="248" height="72" rx="18" fill="#F1F4F6" stroke="#DDE5E8"/>
    <text x="214" y="54" fill="#4B6961" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="700">SERVER</text>
    <text x="214" y="82" fill="#122027" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="800">ONLINE</text>
    <text x="438" y="54" fill="#8C6427" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="700">ALERT</text>
    <text x="438" y="82" fill="#122027" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="800">2 WARN</text>
    <text x="662" y="54" fill="#41618A" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="700">LIVE SAMPLE</text>
    <text x="662" y="82" fill="#122027" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="800">13.6K</text>
    <text x="886" y="54" fill="#607078" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="700">NEXT REPORT</text>
    <text x="886" y="82" fill="#122027" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="800">18:00 자동 리포트</text>
  </g>

  <g transform="translate(156 286)">
    <g filter="url(#shadow)">
      <rect width="366" height="500" rx="24" fill="#141E24" stroke="#293840"/>
      <text x="28" y="42" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="800">위험 채널</text>
      <text x="28" y="68" fill="#93A6AD" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="13">Superset 알림을 홈 작업으로 전환</text>
      <rect x="28" y="104" width="310" height="92" rx="18" fill="#211A12" stroke="#9B6B22"/>
      <text x="52" y="136" fill="#FFD08A" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="800">버퍼 하락</text>
      <text x="52" y="166" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="800">channel_beta</text>
      <rect x="28" y="216" width="310" height="92" rx="18" fill="#121C22" stroke="#2B3A43"/>
      <text x="52" y="248" fill="#93A6AD" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="800">P95 지연 상승</text>
      <text x="52" y="278" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="800">channel_delta</text>
      <rect x="28" y="328" width="310" height="92" rx="18" fill="#121C22" stroke="#2B3A43"/>
      <text x="52" y="360" fill="#93A6AD" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="800">웹/앱 싱크 편차</text>
      <text x="52" y="390" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="800">channel_sigma</text>
    </g>

    <g transform="translate(396 0)" filter="url(#shadow)">
      <rect width="426" height="500" rx="24" fill="#141E24" stroke="#293840"/>
      <text x="28" y="42" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="800">Superset 진단 타임라인</text>
      <text x="28" y="68" fill="#93A6AD" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="13">InfluxDB, 앱 샘플, 웹 샘플을 같은 시간축으로 확인</text>
      <line x1="56" y1="126" x2="56" y2="420" stroke="#33444D" stroke-width="2"/>
      <circle cx="56" cy="132" r="9" fill="#00E09B"/>
      <circle cx="56" cy="230" r="9" fill="#FFB23F"/>
      <circle cx="56" cy="328" r="9" fill="#35D4FF"/>
      <text x="84" y="138" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="800">Metrics Server 온라인</text>
      <text x="84" y="164" fill="#93A6AD" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12">최근 갱신 3초 전</text>
      <text x="84" y="236" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="800">버퍼 경고 2건</text>
      <text x="84" y="262" fill="#93A6AD" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12">멀티라이브 세션 우선 확인</text>
      <text x="84" y="334" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="800">리포트 생성 준비</text>
      <text x="84" y="360" fill="#93A6AD" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12">Superset 상세 대시보드 연결</text>
    </g>

    <g transform="translate(852 0)" filter="url(#shadow)">
      <rect width="306" height="500" rx="24" fill="#F7FAF8"/>
      <text x="24" y="42" fill="#122027" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="800">빠른 조치</text>
      <rect x="24" y="86" width="258" height="56" rx="16" fill="#122027"/>
      <text x="60" y="121" fill="#FFFFFF" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="800">문제 채널 열기</text>
      <rect x="24" y="162" width="258" height="56" rx="16" fill="#EAF7F1" stroke="#BDEBD9"/>
      <text x="58" y="197" fill="#1F4F43" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="800">Superset 원본 보기</text>
      <rect x="24" y="238" width="258" height="56" rx="16" fill="#F1F4F6" stroke="#DDE5E8"/>
      <text x="58" y="273" fill="#36464D" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="800">멀티라이브 재배치</text>
      <rect x="24" y="336" width="258" height="112" rx="18" fill="#101A20"/>
      <text x="48" y="370" fill="#DDEBE7" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="800">연동 방식</text>
      <text x="48" y="404" fill="#93A6AD" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12">1. 홈 요약 API</text>
      <text x="48" y="428" fill="#93A6AD" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12">2. Superset 딥링크</text>
    </g>
  </g>
</svg>

    <rect x="28" y="96" width="654" height="346" rx="20" fill="#111A20"/>
    <rect x="54" y="128" width="160" height="72" rx="16" fill="#1C2930"/>
    <rect x="234" y="128" width="160" height="72" rx="16" fill="#1C2930"/>
    <rect x="414" y="128" width="242" height="72" rx="16" fill="#1C2930"/>
    <text x="76" y="158" fill="#8EA2AA" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12">APP LATENCY</text>
    <text x="76" y="184" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800">2.1s</text>
    <text x="256" y="158" fill="#8EA2AA" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12">BUFFER ALERT</text>
    <text x="256" y="184" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800">4</text>
    <text x="436" y="158" fill="#8EA2AA" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="12">TOP CHANNEL</text>
    <text x="436" y="184" fill="#F4FBF8" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800">channel_a</text>
    <polyline points="74,366 128,328 182,342 236,288 290,302 344,250 398,270 452,220 506,236 560,198 632,214" fill="none" stroke="#00F2A9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="74" y1="390" x2="632" y2="390" stroke="#34464F"/>
    <line x1="74" y1="224" x2="632" y2="224" stroke="#24343D"/>
    <line x1="74" y1="306" x2="632" y2="306" stroke="#24343D"/>
    <rect x="28" y="466" width="206" height="76" rx="18" fill="#F3F7F7" stroke="#D8E1E3"/>
    <rect x="252" y="466" width="206" height="76" rx="18" fill="#F3F7F7" stroke="#D8E1E3"/>
    <rect x="476" y="466" width="206" height="76" rx="18" fill="#F3F7F7" stroke="#D8E1E3"/>
    <text x="52" y="497" fill="#122027" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="800">레이턴시 보드</text>
    <text x="276" y="497" fill="#122027" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="800">VLC 품질 보드</text>
    <text x="500" y="497" fill="#122027" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="800">채널 랭킹</text>

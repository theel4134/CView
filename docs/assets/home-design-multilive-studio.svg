<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141416"/>
      <stop offset="1" stop-color="#0F1012"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FFA3"/>
      <stop offset="1" stop-color="#00A86B"/>
    </linearGradient>
    <linearGradient id="slot" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D3E36"/>
      <stop offset="0.55" stop-color="#273546"/>
      <stop offset="1" stop-color="#17191F"/>
    </linearGradient>
    <linearGradient id="empty" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#242426"/>
      <stop offset="1" stop-color="#1A1B1E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "SF Pro Display", "Apple SD Gothic Neo", sans-serif; fill: #F5F5F7; }
      .headline { font: 700 18px -apple-system, BlinkMacSystemFont, "SF Pro Display", "Apple SD Gothic Neo", sans-serif; fill: #F5F5F7; }
      .body { font: 500 14px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", sans-serif; fill: #C8C8CD; }
      .caption { font: 600 12px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", sans-serif; fill: #8E8E93; }
      .micro { font: 700 10px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", sans-serif; fill: #00FFA3; letter-spacing: 0.4px; }
      .panel { fill: #1C1C1E; stroke: rgba(255,255,255,0.10); stroke-width: 1; }
      .elevated { fill: #242426; stroke: rgba(255,255,255,0.12); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="24" y="22" width="1392" height="856" rx="24" fill="#17181A" stroke="rgba(255,255,255,0.08)"/>
  <rect x="24" y="22" width="236" height="856" rx="24" fill="#151618" stroke="rgba(255,255,255,0.06)"/>
  <rect x="24" y="68" width="1392" height="1" fill="rgba(255,255,255,0.08)"/>
  <circle cx="52" cy="45" r="6" fill="#FF5F57"/>
  <circle cx="74" cy="45" r="6" fill="#FFBD2E"/>
  <circle cx="96" cy="45" r="6" fill="#28C840"/>

  <text x="58" y="116" class="title">CView</text>
  <rect x="48" y="148" width="188" height="38" rx="10" fill="url(#green)" fill-opacity="0.16" stroke="#00FFA3" stroke-opacity="0.45"/>
  <text x="70" y="173" class="body" fill="#F5F5F7">홈</text>
  <rect x="48" y="198" width="188" height="34" rx="10" fill="#1C1C1E"/>
  <text x="70" y="220" class="caption">멀티라이브</text>
  <rect x="48" y="244" width="188" height="34" rx="10" fill="#1C1C1E"/>
  <text x="70" y="266" class="caption">라이브 후보</text>
  <rect x="48" y="290" width="188" height="34" rx="10" fill="#1C1C1E"/>
  <text x="70" y="312" class="caption">채팅</text>

  <text x="300" y="116" class="title">MultiLive Studio Home</text>
  <text x="300" y="142" class="body">홈에서 멀티라이브 세션을 구성하고, 실제 재생 stage로 넘기는 고급 홈</text>

  <g filter="url(#shadow)">
    <rect x="300" y="170" width="1068" height="72" rx="18" class="panel"/>
    <circle cx="328" cy="206" r="6" fill="#FF3B30"/>
    <text x="346" y="210" class="micro" fill="#FF3B30">LIVE</text>
    <text x="396" y="210" class="headline">현재 멀티라이브 3개 진행 중</text>
    <rect x="860" y="188" width="150" height="36" rx="12" fill="url(#green)"/>
    <text x="899" y="211" class="micro" fill="#0A0A0A">전체 보기</text>
    <rect x="1022" y="188" width="112" height="36" rx="12" class="elevated"/>
    <text x="1055" y="211" class="micro">PiP</text>
    <rect x="1146" y="188" width="112" height="36" rx="12" class="elevated"/>
    <text x="1173" y="211" class="micro">채팅</text>
    <rect x="1270" y="188" width="68" height="36" rx="12" class="elevated"/>
    <text x="1294" y="211" class="micro">편집</text>
  </g>

  <g filter="url(#shadow)">

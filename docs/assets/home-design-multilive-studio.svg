    <text x="326" y="338" class="caption">홈은 세션 구성만 담당하고, 실제 플레이어는 멀티라이브 stage로 이동</text>

    <g transform="translate(326 366)">
      <rect width="238" height="160" rx="18" fill="url(#slot)" stroke="#00FFA3" stroke-opacity="0.34"/>
      <rect x="16" y="16" width="206" height="84" rx="12" fill="#070A0B" fill-opacity="0.34"/>
      <circle cx="34" cy="120" r="13" fill="#00FFA3" fill-opacity="0.24"/>
      <text x="58" y="118" class="body">채널 A</text>
      <text x="58" y="138" class="caption">게임 · 8.2K</text>
      <rect x="162" y="112" width="50" height="24" rx="12" fill="#00FFA3" fill-opacity="0.18"/>
      <text x="176" y="128" class="micro">ON</text>
    </g>
    <g transform="translate(584 366)">
      <rect width="238" height="160" rx="18" fill="url(#slot)" stroke="#00FFA3" stroke-opacity="0.34"/>
      <rect x="16" y="16" width="206" height="84" rx="12" fill="#08100E" fill-opacity="0.36"/>
      <circle cx="34" cy="120" r="13" fill="#FF3B30" fill-opacity="0.24"/>
      <text x="58" y="118" class="body">채널 B</text>
      <text x="58" y="138" class="caption">토크 · 2.1K</text>
      <rect x="162" y="112" width="50" height="24" rx="12" fill="#00FFA3" fill-opacity="0.18"/>
      <text x="176" y="128" class="micro">ON</text>
    </g>
    <g transform="translate(842 366)">
      <rect width="238" height="160" rx="18" fill="url(#slot)" stroke="#00FFA3" stroke-opacity="0.34"/>
      <rect x="16" y="16" width="206" height="84" rx="12" fill="#070A0B" fill-opacity="0.34"/>
      <circle cx="34" cy="120" r="13" fill="#5BA3FF" fill-opacity="0.24"/>
      <text x="58" y="118" class="body">채널 C</text>
      <text x="58" y="138" class="caption">음악 · 934</text>
      <rect x="162" y="112" width="50" height="24" rx="12" fill="#00FFA3" fill-opacity="0.18"/>
      <text x="176" y="128" class="micro">ON</text>
    </g>
    <g transform="translate(1100 366)">
      <rect width="238" height="160" rx="18" fill="url(#empty)" stroke="rgba(255,255,255,0.16)" stroke-dasharray="6 7"/>
      <circle cx="119" cy="66" r="24" fill="#00FFA3" fill-opacity="0.12"/>
      <text x="112" y="74" class="title" font-size="22">+</text>
      <text x="70" y="120" class="body">추천 라이브 추가</text>

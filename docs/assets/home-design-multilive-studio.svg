      <circle cx="26" cy="84" r="10" fill="#00FFA3" fill-opacity="0.32"/>
      <circle cx="46" cy="84" r="10" fill="#FF3B30" fill-opacity="0.28"/>
      <circle cx="66" cy="84" r="10" fill="#5BA3FF" fill-opacity="0.28"/>
      <rect x="212" y="70" width="96" height="26" rx="13" fill="url(#green)"/>
      <text x="229" y="87" class="micro" fill="#0A0A0A">시작</text>
    </g>
    <g transform="translate(668 674)">
      <rect width="334" height="112" rx="18" class="elevated"/>
      <text x="20" y="34" class="headline">같은 카테고리 조합</text>
      <text x="20" y="58" class="caption">게임 카테고리 인기 방송 4개</text>
      <circle cx="26" cy="84" r="10" fill="#BF5FFF" fill-opacity="0.28"/>
      <circle cx="46" cy="84" r="10" fill="#00FFA3" fill-opacity="0.32"/>
      <circle cx="66" cy="84" r="10" fill="#FFD700" fill-opacity="0.24"/>
      <circle cx="86" cy="84" r="10" fill="#5BA3FF" fill-opacity="0.24"/>
      <rect x="212" y="70" width="96" height="26" rx="13" fill="url(#green)"/>
      <text x="229" y="87" class="micro" fill="#0A0A0A">시작</text>
    </g>
    <g transform="translate(1036 674)">
      <rect width="332" height="112" rx="18" class="elevated"/>
      <text x="20" y="34" class="headline">최근 시청 복귀</text>
      <text x="20" y="58" class="caption">방금 보던 LIVE 채널 묶음</text>
      <circle cx="26" cy="84" r="10" fill="#5BA3FF" fill-opacity="0.28"/>
      <circle cx="46" cy="84" r="10" fill="#00FFA3" fill-opacity="0.32"/>
      <rect x="210" y="70" width="96" height="26" rx="13" fill="url(#green)"/>
      <text x="227" y="87" class="micro" fill="#0A0A0A">시작</text>
    </g>
  </g>

  <g>
    <text x="300" y="826" class="headline">Live Candidates</text>
    <rect x="472" y="806" width="110" height="34" rx="17" fill="#00FFA3" fill-opacity="0.14" stroke="#00FFA3" stroke-opacity="0.28"/>
    <text x="498" y="827" class="micro">+ 멀티 버튼</text>
    <text x="610" y="827" class="caption">모든 카드 hover에서 재생, 멀티라이브 추가, 채팅만 열기 노출</text>
  </g>
</svg>

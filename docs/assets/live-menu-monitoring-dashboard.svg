      <circle cx="24" cy="27" r="14" fill="#5BA3FF" fill-opacity="0.22"/>
      <text x="48" y="24" class="body">채널 C</text>
      <text x="48" y="41" class="caption">방금 시작</text>
      <text x="184" y="31" class="body">음악 방송</text>

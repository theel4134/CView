    <rect x="614" y="316" width="94" height="28" rx="14" class="elevated"/>
    <text x="636" y="334" class="caption">급상승</text>
    <rect x="718" y="316" width="94" height="28" rx="14" class="elevated"/>
    <text x="742" y="334" class="caption">알림</text>
    <rect x="822" y="316" width="142" height="28" rx="14" class="elevated"/>

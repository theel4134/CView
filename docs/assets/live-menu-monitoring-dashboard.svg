    <text x="1094" y="650" class="caption">오늘의 메인 방송 타이틀</text>
    <text x="1094" y="674" class="caption">게임 · 8.2K · 급상승</text>
    <rect x="1094" y="706" width="250" height="36" rx="18" fill="url(#green)"/>

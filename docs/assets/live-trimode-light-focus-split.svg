<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="video" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172820"/>
      <stop offset="0.55" stop-color="#222B3C"/>
      <stop offset="1" stop-color="#121316"/>
    </linearGradient>
    <style>
      .title { font: 700 25px -apple-system, BlinkMacSystemFont, "SF Pro Display", "Apple SD Gothic Neo", sans-serif; fill: #F5F5F7; }
      .headline { font: 650 16px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", sans-serif; fill: #F5F5F7; }
      .body { font: 500 13px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", sans-serif; fill: #C8C8CD; }
      .caption { font: 500 11px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", sans-serif; fill: #8E8E93; }
      .line { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#141416"/>
  <rect x="24" y="22" width="1392" height="856" rx="22" fill="#17181A" stroke="rgba(255,255,255,0.08)"/>
  <rect x="24" y="22" width="228" height="856" rx="22" fill="#151618" stroke="rgba(255,255,255,0.06)"/>
  <line x1="252" y1="22" x2="252" y2="878" class="line"/>
  <circle cx="52" cy="45" r="6" fill="#FF5F57"/>
  <circle cx="74" cy="45" r="6" fill="#FFBD2E"/>
  <circle cx="96" cy="45" r="6" fill="#28C840"/>
  <text x="56" y="112" class="title">CView</text>
  <rect x="46" y="224" width="182" height="34" rx="8" fill="#00FFA3" fill-opacity="0.12" stroke="#00FFA3" stroke-opacity="0.32"/>

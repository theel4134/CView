    <line x1="20" y1="124" x2="310" y2="124" class="line"/>
    <g transform="translate(20 148)">
      <rect width="290" height="58" rx="10" fill="#1C1C1E"/>
      <circle cx="28" cy="29" r="15" fill="#00FFA3" fill-opacity="0.20"/>
      <text x="56" y="26" class="body">채널 A</text>
      <text x="56" y="43" class="caption">재생 중 · 8.2K</text>
      <circle cx="264" cy="29" r="5" fill="#FF3B30"/>
    </g>
    <g transform="translate(20 218)">
      <rect width="290" height="58" rx="10" fill="#17181A" stroke="rgba(255,255,255,0.06)"/>

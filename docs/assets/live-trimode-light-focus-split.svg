  <g transform="translate(650 112)">
    <rect width="686" height="716" rx="16" fill="#17181A" stroke="rgba(255,255,255,0.08)"/>
    <rect x="24" y="24" width="638" height="438" rx="14" fill="url(#video)"/>
    <rect x="46" y="408" width="54" height="22" rx="11" fill="#FF3B30"/>
    <text x="59" y="423" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">LIVE</text>
    <text x="112" y="423" class="body">채널 A · 단일 시청</text>

    <line x1="24" y1="496" x2="662" y2="496" class="line"/>
    <rect x="24" y="528" width="184" height="64" rx="12" fill="#1C1C1E"/>
    <text x="44" y="556" class="body">탐색 유지</text>
    <text x="44" y="576" class="caption">왼쪽 list 고정</text>
    <rect x="232" y="528" width="184" height="64" rx="12" fill="#1C1C1E"/>
    <text x="252" y="556" class="body">시청 집중</text>
    <text x="252" y="576" class="caption">player first</text>
    <rect x="440" y="528" width="184" height="64" rx="12" fill="#1C1C1E"/>
    <text x="460" y="556" class="body">멀티 전환</text>
    <text x="460" y="576" class="caption">same focus area</text>

    <rect x="24" y="626" width="638" height="42" rx="12" fill="#101113" stroke="rgba(255,255,255,0.08)"/>
    <text x="46" y="652" class="caption">Chat drawer는 필요할 때만 오른쪽에서 열림. 기본 화면은 list + player 두 덩어리만 유지.</text>

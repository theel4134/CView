      <text x="56" y="26" class="body">채널 B</text>
      <text x="56" y="43" class="caption">+ 멀티</text>
    </g>
    <g transform="translate(20 288)">
      <rect width="290" height="58" rx="10" fill="#17181A" stroke="rgba(255,255,255,0.06)"/>
      <circle cx="28" cy="29" r="15" fill="#FF9F0A" fill-opacity="0.16"/>
      <text x="56" y="26" class="body">채널 C</text>
      <text x="56" y="43" class="caption">채팅만 열기</text>
    </g>

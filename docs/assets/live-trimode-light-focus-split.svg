  <rect x="46" y="270" width="182" height="34" rx="8" fill="#1C1C1E"/>
  <text x="68" y="292" class="caption">카테고리</text>

  <rect x="252" y="22" width="1164" height="56" fill="#17181A"/>
  <line x1="252" y1="78" x2="1416" y2="78" class="line"/>
  <text x="292" y="56" class="headline">Focus Split</text>
  <rect x="616" y="34" width="278" height="32" rx="16" fill="#101113" stroke="rgba(255,255,255,0.10)"/>

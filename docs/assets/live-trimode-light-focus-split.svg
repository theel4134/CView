  <rect x="724" y="39" width="74" height="22" rx="11" fill="#00FFA3"/>
  <text x="748" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif" font-size="11" font-weight="700" fill="#0A0A0A">시청</text>
  <text x="836" y="54" class="caption">멀티</text>
  <text x="1170" y="54" class="caption">현재 채널 A · 채팅 side</text>

  <g transform="translate(292 112)">
    <rect width="330" height="716" rx="16" fill="#17181A" stroke="rgba(255,255,255,0.08)"/>

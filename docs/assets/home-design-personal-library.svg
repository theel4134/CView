  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="24" y="22" width="1392" height="856" rx="24" fill="#17181A" stroke="rgba(255,255,255,0.08)"/>
  <rect x="24" y="22" width="236" height="856" rx="24" fill="#151618" stroke="rgba(255,255,255,0.06)"/>
  <rect x="24" y="68" width="1392" height="1" fill="rgba(255,255,255,0.08)"/>
  <circle cx="52" cy="45" r="6" fill="#FF5F57"/>
  <circle cx="74" cy="45" r="6" fill="#FFBD2E"/>
  <circle cx="96" cy="45" r="6" fill="#28C840"/>

  <text x="58" y="116" class="title">CView</text>
  <rect x="48" y="148" width="188" height="38" rx="10" fill="url(#green)" fill-opacity="0.16" stroke="#00FFA3" stroke-opacity="0.45"/>
  <text x="70" y="173" class="body" fill="#F5F5F7">홈</text>
  <rect x="48" y="198" width="188" height="34" rx="10" fill="#1C1C1E"/>
  <text x="70" y="220" class="caption">라이브</text>
  <rect x="48" y="244" width="188" height="34" rx="10" fill="#1C1C1E"/>
  <text x="70" y="266" class="caption">최근/즐겨찾기</text>
  <rect x="48" y="290" width="188" height="34" rx="10" fill="#1C1C1E"/>

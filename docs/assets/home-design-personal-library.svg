      <rect width="616" height="52" rx="14" class="elevated"/>
      <circle cx="28" cy="26" r="17" fill="#5BA3FF" fill-opacity="0.22"/>
      <text x="68" y="23" class="body">최근 보던 채널 C</text>
      <text x="68" y="40" class="caption">오프라인 · 채널 상세로 이동</text>
      <rect x="498" y="14" width="88" height="24" rx="12" fill="#242426" stroke="rgba(255,255,255,0.12)"/>

    <text x="1058" y="584" class="body">네이버 쿠키 로그인 필요</text>
    <text x="1058" y="602" class="caption">팔로잉 라이브 조회 정확도 개선</text>
    <rect x="1038" y="632" width="306" height="54" rx="14" class="elevated"/>
    <text x="1058" y="657" class="body">캐시 복원 완료</text>
